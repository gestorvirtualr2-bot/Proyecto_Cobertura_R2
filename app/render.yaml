services:
  - type: web
    name: claro-cobertura-pro
    runtime: python
    pythonVersion: 3.11.7
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "streamlit run app/main.py --server.port $PORT --server.headless true"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: PIP_VERSION
        value: "23.3.2"
    plan: free
